<app-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <app-date-range-picker
        [startDate]="startDate$ | async"
        [endDate]="endDate$ | async"
        minDate="2017-01-01"
        maxDate="2030-01-01"
        (valueChanged)="handleRangeChange($event)"
      ></app-date-range-picker>
    </div>
    <div class="space">
      <app-dropdown-select
        [items]="providerDropDownSelectOptions$ | async"
        [selectedItem]="selectedProvider$ | async"
        placeholder="No Selection"
        (selectionChange)="onProviderDropdownSelected($event)"
      />
    </div>
    <div class="space">
      <app-dropdown-select
        [items]="dropDownSelectOptions$ | async"
        [selectedItem]="selectedServiceProvider$ | async"
        placeholder="No Selection"
        (selectionChange)="onDropdownSelected($event)"
      />
    </div>
    <div class="space">
      <app-search-input (search)="onSearch($event)"></app-search-input>
    </div>
  </ng-container>
  <ng-container filters-partial-size> </ng-container>

  <ng-container main-content>
    <app-transaction-header
      [transactions]="transactions$ | async"
    ></app-transaction-header>
    <div class="scrollable-container mt-3">
      <table class="table">
        <thead>
          <tr>
            <th class="col-2">Date</th>
            <th class="col-2">Amount</th>
            <th class="col-2">Ignored</th>
            <th class="col-2">Service Provider</th>
            <th class="col-4">Description</th>
          </tr>
        </thead>
        <tbody>
          @for (tran of transactions$ | async; track tran.id) {
          <tr [ngStyle]="{ 'background-color': tran.color }">
            <td class="col-2">
              {{ tran.registrationDate | date : "dd-MMM-yyyy" }}
            </td>
            <td class="col-2">{{ tran.amount }}</td>
            <td class="col-2">
              <app-checkbox
                [id]="tran.id"
                [checked]="tran.ignored"
                [disabled]="true"
              />
            </td>
            <td class="col-2">{{ tran.serviceProvider }}</td>
            <td class="col-4">{{ tran.description }}</td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </ng-container>
</app-side-bar>
