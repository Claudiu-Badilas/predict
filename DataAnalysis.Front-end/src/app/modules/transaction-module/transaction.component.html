<app-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <app-date-range-picker
        [startDate]="startDate"
        [endDate]="endDate"
        (valueChanged)="handleRangeChange($event)"
      ></app-date-range-picker>
    </div>
  </ng-container>
  <ng-container filters-partial-size> </ng-container>

  <ng-container main-content>
    <div class="scrollable-container">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">Date</th>
            <th scope="col">Amount</th>
            <th scope="col">Provider</th>
            <th scope="col">Description</th>
          </tr>
        </thead>
        <tbody>
          @for (tran of transactions$ | async; track tran) {
          <tr>
            <td>{{ tran.registrationDate | date : "dd-MM-yyyy" }}</td>
            <td>{{ tran.amount }}</td>
            <td>{{ tran.provider }}</td>
            <td>{{ tran.description }}</td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </ng-container>
</app-side-bar>
