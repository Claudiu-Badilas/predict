<app-side-bar>
  <ng-container filters-full-size
    ><div class="space">
      <app-toggle-button
        [options]="['Summary', 'Products']"
        [selected]="'Products'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
    <div class="space">
      <app-date-range-picker
        [startDate]="startDate$ | async"
        [endDate]="endDate$ | async"
        minDate="2021-12-01"
        [maxDate]="now"
        (valueChanged)="handleRangeChange($event)"
      />
    </div>
    <div class="space">
      <app-search-input (search)="onSearch($event)" />
    </div>
  </ng-container>

  <ng-container filters-partial-size> </ng-container>

  <ng-container main-content>
    <div>
      <app-highcharts-wrapper
        [chartOptions]="dailyPurchasedProductChart$ | async"
      />
    </div>
    <div class="mt-3">
      <app-highcharts-wrapper
        [chartOptions]="productPriceTrendChartUtils$ | async"
      />
    </div>
  </ng-container>
</app-side-bar>
