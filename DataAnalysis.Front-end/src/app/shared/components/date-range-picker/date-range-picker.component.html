<div class="d-flex flex-column">
  <div class="d-flex align-items-center pickers">
    <date-picker
      [selectedDate]="startDate"
      [minDate]="minDate"
      [maxDate]="endDate"
      (selectedDateChange)="onStartDateChange($event)"
    ></date-picker>

    <date-picker
      [selectedDate]="endDate"
      [minDate]="startDate"
      [maxDate]="maxDate"
      (selectedDateChange)="onEndDateChange($event)"
    ></date-picker>
  </div>
</div>
