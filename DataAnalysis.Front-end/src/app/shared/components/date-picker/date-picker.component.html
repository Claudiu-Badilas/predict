<div class="date-picker-container">
  <label>Select a date:</label
  ><input
    class="date-picker"
    type="date"
    [(ngModel)]="selectedDate"
    [min]="minDate"
    [max]="maxDate"
    [disabled]="false"
    (ngModelChange)="onDateChange($event)"
    (keydown)="preventTyping($event)"
    (keypress)="preventTyping($event)"
    (paste)="preventTyping($event)"
  />
</div>
