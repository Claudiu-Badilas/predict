<div class="background">
  <form
    [formGroup]="credentialForm"
    (ngSubmit)="onSubmitChanges(credentialForm)"
    class="form"
  >
    <h3 class="text-center">
      {{ getInputValue("authenticationAction") }} Here
    </h3>
    <label for="email">Email</label>
    <input
      class="form-control"
      type="email"
      placeholder="Email address"
      name="emailId"
      formControlName="email"
      [ngClass]="{
        'is-invalid': isValidateInputValue('email')
      }"
    />
    <span
      *ngIf="isValidateInputValue('email')"
      class="invalid-feedback d-flex position-absolute"
    >
      {{ getInputValidationError("email") }}
    </span>
    <label for="password">Password</label>
    <input
      class="form-control"
      type="password"
      placeholder="Password"
      name="passwordId"
      formControlName="password"
      [ngClass]="{
        'is-invalid': isValidateInputValue('password')
      }"
    />
    <span
      *ngIf="isValidateInputValue('password')"
      class="invalid-feedback d-flex position-absolute"
    >
      {{ getInputValidationError("password") }}
    </span>

    <div *ngIf="isRegisterFromSelected()">
      <label for="confirmPassword">Confirm Password</label>
      <input
        class="form-control"
        type="confirmPassword"
        placeholder="Password"
        name="confirmPasswordId"
        formControlName="confirmPassword"
        [ngClass]="{
          'is-invalid': isValidateInputValue('confirmPassword')
        }"
      />
      <span
        *ngIf="isValidateInputValue('confirmPassword')"
        class="invalid-feedback d-flex position-absolute"
      >
        {{ getInputValidationError("confirmPassword") }}
      </span>
    </div>
    <button class="" type="submit" [disabled]="credentialForm.invalid">
      {{ getInputValue("authenticationAction") }}
    </button>

    <div class="mt-3">
      {{ getInputValue("authenticationMessage") }}
      <span class="clickable" (click)="onChangeAuthAction()">
        <b> here</b>
      </span>
    </div>
  </form>
</div>
