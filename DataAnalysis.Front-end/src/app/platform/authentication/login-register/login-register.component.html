<div class="background">
  <form
    [formGroup]="credentialForm"
    (ngSubmit)="onSubmitChanges(credentialForm)"
    class="form"
  >
    <h3 class="text-center text-capitalize">
      {{ getInputValue("authenticationAction") }}
    </h3>
    <label for="email">Email</label>
    <input
      class="form-control"
      type="email"
      placeholder="Email address"
      name="emailId"
      formControlName="email"
      [ngClass]="{
        'is-invalid': isInvalidInput('email')
      }"
    />
    <span
      *ngIf="isInvalidInput('email')"
      class="invalid-feedback d-flex position-absolute"
    >
      {{ getInputValidationError("email") }}
    </span>
    <label for="password">Password</label>
    <div class="password-input">
      <input
        class="form-control"
        [type]="isVisiblePassword ? 'text' : 'password'"
        placeholder="Password"
        name="passwordId"
        formControlName="password"
        [ngClass]="{
          'is-invalid': isInvalidInput('password')
        }"
      /><img
        src="assets/icons/eye.svg"
        (click)="onChangePasswordInputType()"
        alt="no-image"
        width="25"
      />
      <span
        *ngIf="isInvalidInput('password')"
        class="invalid-feedback d-flex position-absolute"
      >
        {{ getInputValidationError("password") }}
      </span>
    </div>
    <div *ngIf="isRegisterActive">
      <label for="confirmPassword">Confirm Password</label>
      <div class="password-input">
        <input
          class="form-control"
          [type]="isVisiblePassword ? 'text' : 'password'"
          placeholder="Password"
          name="confirmPasswordId"
          formControlName="confirmPassword"
          [ngClass]="{
            'is-invalid': isInvalidInput('confirmPassword')
          }"
        /><img
          src="assets/icons/eye.svg"
          (click)="onChangePasswordInputType()"
          alt="no-image"
          width="25"
        />
      </div>
      <span
        *ngIf="credentialForm.errors?.['isMatchPasswords']"
        class="invalid-feedback d-flex position-absolute"
      >
        Please make sure is matching password
      </span>
    </div>
    <button class="" type="submit" [disabled]="isFormInvalid()">
      {{ getInputValue("authenticationAction") }}
    </button>

    <div class="mt-3">
      {{ getInputValue("authenticationMessage") }}
      <span class="clickable" (click)="onChangeAuthAction()">
        <b> here</b>
      </span>
    </div>
  </form>
</div>
