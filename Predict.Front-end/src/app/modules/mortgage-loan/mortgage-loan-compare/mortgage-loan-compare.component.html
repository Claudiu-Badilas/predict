<app-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <app-toggle-button
        [options]="['Overview', 'Detailed', 'Compare']"
        [selected]="'Compare'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>

    <div class="space d-flex flex-column">
      <div>Left</div>
      <app-dropdown-select
        [items]="repaymentSchedulesOptions$ | async"
        [selectedItem]="selectedLeftValue$ | async"
        placeholder="No Selection"
        (selectionChange)="onLeftDropdownSelected($event)"
      />
    </div>

    <div class="space d-flex flex-column">
      <div>Right</div>
      <app-dropdown-select
        [items]="repaymentSchedulesOptions$ | async"
        [selectedItem]="selectedRightValue$ | async"
        placeholder="No Selection"
        (selectionChange)="onRightDropdownSelected($event)"
      />
    </div>
  </ng-container>

  <ng-container filters-partial-size></ng-container>

  <ng-container main-content>
    <div class="d-flex mb-3">
      <div class="w-50 mr-3">
        <app-highcharts-wrapper
          [chartOptions]="compareRatesTrendChart$ | async"
        />
      </div>
      <app-highcharts-wrapper
        class="w-50"
        [chartOptions]="compareInterestTrendChart$ | async"
      />
    </div>
    <mortgage-loan-compare-body
      [left]="leftRepaymentSchedules$ | async"
      [right]="rightRepaymentSchedules$ | async"
    >
    </mortgage-loan-compare-body>
  </ng-container>
</app-side-bar>
