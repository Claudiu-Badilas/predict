<app-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <app-toggle-button
        [options]="['Overview', 'Detailed', 'Compare', 'Simulator']"
        [selected]="'Simulator'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
  </ng-container>

  <ng-container filters-partial-size></ng-container>

  <ng-container main-content>
    <app-highcharts-wrapper [chartOptions]="mortgageLoanAmountChart$ | async"
  /></ng-container>
</app-side-bar>
