<app-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <app-toggle-button
        [options]="['Overview', 'Compare', 'Detailed']"
        [selected]="'Detailed'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
  </ng-container>

  <ng-container filters-partial-size></ng-container>

  <ng-container main-content>
    <div class="d-flex gap">
      <app-highcharts-wrapper
        class="w-50"
        [chartOptions]="mortgageLoanProgressChart$ | async"
      />
      <app-highcharts-wrapper
        class="w-50"
        [chartOptions]="mortgageLoanProgressChart$ | async"
      />
    </div>
  </ng-container>
</app-side-bar>
