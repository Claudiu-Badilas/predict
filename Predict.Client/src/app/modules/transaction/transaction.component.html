<p-top-bar>
  <ng-container module-navigation> </ng-container>
</p-top-bar>

<div class="row m-1">
  <!-- Date picker (full width on mobile) -->
  <div class="col-12 col-md-6 col-lg-3 px-1 mb-2">
    <p-date-range-picker
      [startDate]="startDate$ | async"
      [endDate]="endDate$ | async"
      [minDate]="minDate"
      [maxDate]="maxDate"
      (valueChanged)="handleRangeChange($event)"
    />
  </div>

  <!-- Dropdowns side by side on mobile -->
  <div class="col-6 col-md-6 col-lg-3 px-1 mb-2">
    <p-dropdown-select
      [items]="providerDropDownSelectOptions$ | async"
      [selectedItem]="selectedProvider$ | async"
      placeholder="No Selection"
      (selectionChange)="onProviderDropdownSelected($event)"
    />
  </div>

  <div class="col-6 col-md-6 col-lg-3 px-1 mb-2">
    <p-dropdown-select
      [items]="dropDownSelectOptions$ | async"
      [selectedItem]="selectedServiceProvider$ | async"
      placeholder="No Selection"
      (selectionChange)="onDropdownSelected($event)"
    />
  </div>

  <!-- Search (full width on mobile) -->
  <div class="col-12 col-md-6 col-lg-3 px-1 mb-2">
    <p-search-input (search)="onSearch($event)" />
  </div>
</div>

<div class="p-2">
  <p-transaction-header [transactions]="transactions$ | async" />
  <div class="mt-3">
    <p-highcharts-wrapper [chartOptions]="monthlyTransactionsChart$ | async" />
  </div>
  <div class="mt-3">
    <p-highcharts-wrapper [chartOptions]="dailyTransactionsChart$ | async" />
  </div>
  <div class="mt-3">
    <p-transaction-table />
  </div>
</div>
