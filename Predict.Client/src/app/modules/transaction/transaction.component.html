<p-top-bar>
  <ng-container module-navigation> </ng-container>
</p-top-bar>

<div class="row m-1">
  <!-- Date picker (full width on mobile) -->
  <div class="col-12 col-md-6 col-lg-3 px-1 mb-2">
    <p-date-range-picker
      [startDate]="startDate()"
      [endDate]="endDate()"
      [minDate]="minDate"
      [maxDate]="maxDate"
      (valueChanged)="handleRangeChange($event)"
    />
  </div>

  <!-- Dropdowns side by side on mobile -->
  <div class="col-6 col-md-6 col-lg-3 px-1 mb-2">
    <p-dropdown-select
      [items]="providerDropDownSelectOptions()"
      [selectedItem]="selectedProvider()"
      placeholder="No Selection"
      (selectionChange)="onProviderDropdownSelected($event)"
    />
  </div>

  <div class="col-6 col-md-6 col-lg-3 px-1 mb-2">
    <p-dropdown-select
      [items]="dropDownSelectOptions()"
      [selectedItem]="selectedServiceProvider()"
      placeholder="No Selection"
      (selectionChange)="onDropdownSelected($event)"
    />
  </div>

  <!-- Search (full width on mobile) -->
  <div class="col-12 col-md-6 col-lg-3 px-1 mb-2">
    <p-search-input (search)="onSearch($event)" />
  </div>
</div>

<div class="px-2 pb-2">
  <p-transaction-header [transactions]="transactions()" />
  <div class="mt-3">
    <p-highcharts-wrapper
      class="chart-wrapper"
      [chartOptions]="dailyTransactionsChart()"
    >
      <ng-container p-highcharts-wrapper-content>
        <div class="m-2 d-flex align-items-center justify-content-between">
          <div class="title">Daily Transactions</div>
          <div class="w-50">
            <p-toggle-button
              [options]="['Expense', 'Income']"
              [selected]="transactionType()"
              [gradient]="{
                primaryColor: '#047f94',
                secondaryColor: '#d5a326',
              }"
              (selectionChange)="onTransactionTypeChange($event)"
            />
          </div>
        </div> </ng-container
    ></p-highcharts-wrapper>
  </div>
  <div class="mt-3">
    <p-highcharts-wrapper [chartOptions]="monthlyTransactionsChart()" />
  </div>
</div>
