<app-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <app-toggle-button
        [options]="['Overview', 'Detailed', 'Compare']"
        [selected]="'Compare'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>

    <div class="space d-flex flex-column">
      <div>Left</div>
      <app-dropdown-select
        [items]="repaymentSchedulesOptions()"
        [selectedItem]="selectedLeftValue()"
        placeholder="No Selection"
        (selectionChange)="onLeftDropdownSelected($event)"
      />
    </div>

    <div class="space d-flex flex-column">
      <div>Right</div>
      <app-dropdown-select
        [items]="repaymentSchedulesOptions()"
        [selectedItem]="selectedRightValue()"
        placeholder="No Selection"
        (selectionChange)="onRightDropdownSelected($event)"
      />
    </div>
  </ng-container>

  <ng-container main-content>
    <div class="mb-3">
      <app-mortgage-loan-compare-header></app-mortgage-loan-compare-header>
    </div>
    <div class="mb-3">
      <app-highcharts-wrapper [chartOptions]="compareRatesTrendChart()" />
    </div>
    <div>
      <app-mortgage-loan-compare-body></app-mortgage-loan-compare-body>
    </div>
  </ng-container>
</app-side-bar>
