<app-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <app-toggle-button
        [options]="['Overview', 'Detailed', 'Compare']"
        [selected]="'Overview'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
    <app-dropdown-select
      class="space"
      [items]="dropDownSelectOptions$ | async"
      [selectedItem]="selectedRepaymentScheduleName$ | async"
      placeholder="No Selection"
      (selectionChange)="onDropdownSelected($event)"
    />

    <div class="space">
      <app-numeric-input
        id="targetAmount"
        [label]="'Monthly Amount'"
        [value]="monthlyAmount()"
        (valueChange)="onMonthlyAmountChange($event)"
      />
    </div>
    <div class="space">
      <app-numeric-input
        id="targetAmount"
        [label]="'Months'"
        [value]="payments()"
        (valueChange)="onPaymentsChange($event)"
      />
    </div>
    <div class="space">
      <app-checkbox
        [label]="'Toggle ONLY summary rows'"
        [id]="'total row'"
        [checked]="showOnlyTotalRow()"
        (valueChange)="onOnlyShowTotalRow($event)"
      />
    </div>
    <div class="space">
      <app-checkbox
        [label]="'Old version'"
        [id]="'total version'"
        [checked]="oldVersion()"
        (valueChange)="onOldVersion($event)"
      />
    </div>
  </ng-container>

  <ng-container main-content
    ><div>
      @let selectedRepaymentSchedule = selectedRepaymentSchedule$ | async;
      @if (oldVersion()) {
        <app-mortgage-loan-overview-header
          [overviewLoanInstalments]="
            selectedRepaymentSchedule?.overviewLoanInstalments ?? []
          "
        />
        <app-mortgage-loan-overview-body-table
          [showTotalRow]="showTotalRow()"
          [showOnlyTotalRow]="showOnlyTotalRow()"
        />
      } @else {
        <app-header
          [monthlyInstalmentGroups]="monthlyInstalmentBatches()"
        ></app-header>
        <app-installment-table
          class="mt-3"
          [showOnlyTotalRow]="showOnlyTotalRow()"
          [monthlyInstalmentGroups]="monthlyInstalmentBatches()"
        />
      }
    </div>
  </ng-container>
</app-side-bar>
