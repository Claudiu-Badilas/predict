<p-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <p-toggle-button
        [options]="['Overview', 'Detailed', 'Compare']"
        [selected]="'Overview'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
    <p-dropdown-select
      class="space"
      [items]="dropDownSelectOptions$ | async"
      [selectedItem]="selectedRepaymentScheduleName$ | async"
      placeholder="No Selection"
      (selectionChange)="onDropdownSelected($event)"
    />

    <div class="space">
      <p-numeric-input
        id="targetAmount"
        [label]="'Monthly amount'"
        [value]="monthlyAmount()"
        (valueChange)="onMonthlyAmountChange($event)"
      />
    </div>
    <div class="space">
      <p-numeric-input
        id="targetAmount"
        [label]="'Months'"
        [value]="payments()"
        (valueChange)="onPaymentsChange($event)"
      />
    </div>
    <div class="space w-100 text-center">
      <span class="p-2 note"> ASIGURARE PAD 01-Dec-2026 </span>
    </div>
  </ng-container>

  <ng-container main-content>
    <div class="m-2">
      <p-mortgage-loan-overview-header
        class="m-2"
        [monthlyInstalmentGroups]="monthlyInstalmentBatches()"
      ></p-mortgage-loan-overview-header>
      <p-mortgage-loan-overview-body-table
        class="m-2"
        [monthlyInstalmentGroups]="monthlyInstalmentBatches()"
      />
    </div>
  </ng-container>
</p-side-bar>
