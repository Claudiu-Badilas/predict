<p-top-bar>
  <ng-container module-navigation>
    <div class="w-100">
      <p-toggle-button
        [options]="['Overview', 'Detailed', 'Compare']"
        [selected]="'Overview'"
        (selectionChange)="onSelectionChange($event)"
      />
      <!-- <div
        class="download btn py-0 px-1 btn-outline-primary mx-2"
        (click)="downloadSchedules()"
      >
        ↓
      </div>
      <label class="m-0 p-0">
        <div class="upload btn py-0 px-1 btn-outline-primary">↑</div>

        <input
          type="file"
          accept=".json"
          (change)="onFileSelected($event)"
          style="display: none"
        />
      </label>-->
    </div>
  </ng-container>
</p-top-bar>

<div class="mt-2 mx-2">
  <p-dropdown-select
    [items]="dropDownSelectOptions$ | async"
    [selectedItem]="selectedRepaymentScheduleName$ | async"
    placeholder="No Selection"
    (selectionChange)="onDropdownSelected($event)"
  />
</div>

<div class="d-flex align-items-center justify-content-between mt-2 mx-2">
  <p-numeric-input
    id="targetAmount"
    [value]="monthlyAmount()"
    (valueChange)="onMonthlyAmountChange($event)"
  />
  <p-numeric-input
    id="targetAmount"
    [value]="payments()"
    (valueChange)="onPaymentsChange($event)"
  />
  <div>
    <span class="p-2 note"> PAD Dec-2026 </span>
  </div>
</div>

<div class="m-2">
  <p-mortgage-loan-overview-header
    [monthlyInstalmentGroups]="monthlyInstalmentBatches()"
  ></p-mortgage-loan-overview-header>
  <p-mortgage-loan-overview-body-table
    [monthlyInstalmentGroups]="monthlyInstalmentBatches()"
  />
</div>
